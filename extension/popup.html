<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>GOG Games Saver</h1>
      <span id="count" class="count">0 saved</span>
    </header>

    <div class="actions">
      <button id="export-csv" class="btn">Export CSV</button>
      <button id="export-json" class="btn">Export JSON</button>
      <button id="clear" class="btn btn-danger">Clear all</button>
    </div>

    <ul id="list" class="list"></ul>
    <p id="empty" class="empty">No games saved yet. Open a game on gog-games.to and click “💾 Save game”.</p>

    <script src="popup.js"></script>
  </body>
</html>
